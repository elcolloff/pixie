name: get-image
permissions:
  contents: read
jobs:
  get-image:
    runs-on: ubuntu-latest
    outputs:
      image-with-tag: ${{ steps.get-version.outputs.image }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        ref: ${{ inputs.ref }}
    - id: get-version
      run: IMAGE_NAME="ghcr.io/pixie-io/${{ inputs.image-base-name }}"; IMAGE_TAG="$(grep DOCKER_IMAGE_TAG docker.properties | cut -d'=' -f2)"; echo "image=${IMAGE_NAME}:${IMAGE_TAG}" >> $GITHUB_OUTPUT
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_call:
    inputs:
      image-base-name:
        required: true
        type: string
      ref:
        type: string
        required: false
        default: ''
    outputs:
      image-with-tag:
        description: A image with tag (from docker.properties) for the requested image
        value: ${{ jobs.get-image.outputs.image-with-tag }}
