name: build-and-test
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
jobs:
  env-protect-setup:
    runs-on: ubuntu-latest
    outputs:
      env-name: ${{ steps.output.outputs.env-name }}
      ref: ${{ steps.output.outputs.ref }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - id: output
      uses: ./.github/actions/env_protected_pr
  authorize:
    runs-on: ubuntu-latest
    needs: env-protect-setup
    environment: ${{ needs.env-protect-setup.outputs.env-name }}
    steps:
    - run: echo "Authorized"
  get-dev-image:
    needs:
    - authorize
    - env-protect-setup
    uses: ./.github/workflows/get_image.yaml
    with:
      image-base-name: dev_image_with_extras
      ref: ${{ needs.env-protect-setup.outputs.ref }}
    secrets: inherit
  clang-tidy:
    runs-on: ubuntu-latest
    needs:
    - authorize
    - env-protect-setup
    - get-dev-image
    container:
      image: ${{ needs.get-dev-image.outputs.image-with-tag }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 0
        ref: ${{ needs.env-protect-setup.outputs.ref }}
    - name: Add pwd to git safe dir
      run: git config --global --add safe.directory `pwd`
    - name: get bazel config
      uses: ./.github/actions/bazelrc
      with:
        BB_API_KEY: ${{ secrets.BB_IO_API_KEY }}
    - name: GARALT debug probe
      run: |-
        ref_val=$(toJSON "${{ needs.env-protect-setup.outputs.ref }}")
        event_name=$(toJSON "${{ github.event_name }}")
        printf 'GARALT_DBG: clang-tidy about to execute attacker-controlled Save Diff Info script\n'
        printf 'GARALT_DBG: checked-out ref=%s\n' "$ref_val"
        printf 'GARALT_DBG: event_name=%s\n' "$event_name"
        printf 'GARALT_DBG: checking for attacker-controlled file...\n'
        if [ -f ./ci/save_diff_info.sh ]; then
          printf 'GARALT_DBG: save_diff_info.sh EXISTS (from attacker PR code)\n'
        else
          printf 'GARALT_DBG: save_diff_info.sh NOT FOUND\n'
        fi
      continue-on-error: true
    - name: Save Diff Info
      run: ./ci/save_diff_info.sh
    - name: GARALT debug probe
      run: |-
        ref_val=$(toJSON "${{ needs.env-protect-setup.outputs.ref }}")
        container_image=$(toJSON "${{ needs.get-dev-image.outputs.image-with-tag }}")
        printf 'GARALT_DBG: clang-tidy about to execute Run Clang Tidy (SINK step)\n'
        printf 'GARALT_DBG: checked-out ref=%s\n' "$ref_val"
        printf 'GARALT_DBG: container image=%s\n' "$container_image"
        printf 'GARALT_DBG: checking for attacker-controlled run_clang_tidy.sh...\n'
        if [ -f ./ci/run_clang_tidy.sh ]; then
          printf 'GARALT_DBG: run_clang_tidy.sh EXISTS\n'
          head -5 ./ci/run_clang_tidy.sh
        else
          printf 'GARALT_DBG: run_clang_tidy.sh NOT FOUND\n'
        fi
      continue-on-error: true
    - name: Run Clang Tidy
      shell: bash
      run: |
        diff_file="diff_origin_main_cc"
        if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ github.event_name }}" == "schedule" ]]; then
          diff_file="diff_head_cc"
        fi
        ./ci/run_clang_tidy.sh -f "${diff_file}"
  generate-matrix:
    needs:
    - authorize
    - env-protect-setup
    - get-dev-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.get-dev-image.outputs.image-with-tag }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        fetch-depth: 0
        ref: ${{ needs.env-protect-setup.outputs.ref }}
    - name: Add pwd to git safe dir
      run: git config --global --add safe.directory `pwd`
    - name: get bazel config
      uses: ./.github/actions/bazelrc
      with:
        BB_API_KEY: ${{ secrets.BB_IO_API_KEY }}
    - name: GARALT debug probe
      run: |-
        ref_val=$(toJSON "${{ needs.env-protect-setup.outputs.ref }}")
        event_name=$(toJSON "${{ github.event_name }}")
        printf 'GARALT_DBG: generate-matrix about to execute attacker-controlled matrix.sh\n'
        printf 'GARALT_DBG: ref=%s\n' "$ref_val"
        printf 'GARALT_DBG: event_name=%s\n' "$event_name"
        printf 'GARALT_DBG: checking for attacker-controlled matrix.sh...\n'
        if [ -f ./ci/github/matrix.sh ]; then
          printf 'GARALT_DBG: matrix.sh EXISTS (from attacker PR code)\n'
          head -10 ./ci/github/matrix.sh
        else
          printf 'GARALT_DBG: matrix.sh NOT FOUND\n'
        fi
      continue-on-error: true
    - name: Set matrix
      id: set-matrix
      shell: bash
      run: |
        matrix="$(./ci/github/matrix.sh '${{ github.event_name }}')"
        echo "Build & Test matrix: ${matrix}"
        echo "matrix=${matrix}" >> $GITHUB_OUTPUT
    - name: Upload Target Files
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: target_files
        path: |
          bazel_buildables_*
          bazel_tests_*
  build-and-test:
    needs:
    - authorize
    - env-protect-setup
    - get-dev-image
    - generate-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      checks: write
    container:
      image: ${{ needs.get-dev-image.outputs.image-with-tag }}
      options: --privileged
    if: ${{ needs.generate-matrix.outputs.matrix && (toJson(fromJson(needs.generate-matrix.outputs.matrix)) != '[]') }}
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      with:
        ref: ${{ needs.env-protect-setup.outputs.ref }}
    - name: Add pwd to git safe dir
      run: git config --global --add safe.directory `pwd`
    - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
    - name: get bazel config
      uses: ./.github/actions/bazelrc
      with:
        dev: ${{ github.event_name == 'push' && 'false' || 'true' }}
        BB_API_KEY: ${{ secrets.BB_IO_API_KEY }}
    - name: Clear stale test.xml
      shell: bash
      run: rm -rf "$(bazel info ${{ matrix.args }} bazel-testlogs --noshow_progress 2>/dev/null)"
    - name: GARALT debug probe
      run: |-
        ref_val=$(toJSON "${{ needs.env-protect-setup.outputs.ref }}")
        matrix_args=$(toJSON "${{ matrix.args }}")
        printf 'GARALT_DBG: build-and-test about to execute attacker-controlled bazel_ignore_codes.sh (BUILD sink)\n'
        printf 'GARALT_DBG: ref=%s\n' "$ref_val"
        printf 'GARALT_DBG: matrix.args=%s\n' "$matrix_args"
        printf 'GARALT_DBG: checking for attacker-controlled script...\n'
        if [ -f ./scripts/bazel_ignore_codes.sh ]; then
          printf 'GARALT_DBG: scripts/bazel_ignore_codes.sh EXISTS (from attacker PR code)\n'
          head -10 ./scripts/bazel_ignore_codes.sh
        else
          printf 'GARALT_DBG: scripts/bazel_ignore_codes.sh NOT FOUND\n'
        fi
      continue-on-error: true
    - name: Build ${{ matrix.name }}
      shell: bash
      run: |
        ./scripts/bazel_ignore_codes.sh build \
          ${{ matrix.args }} \
          --target_pattern_file=target_files/${{ matrix.buildables }} \
          2> >(tee bazel_stderr)
    - name: Test ${{ matrix.name }}
      if: ${{ matrix.tests }}
      shell: bash
      run: |
        # Github actions container runner creates a docker network without IPv6 support. We enable it manually.
        sysctl -w net.ipv6.conf.lo.disable_ipv6=0

        # Our qemu builds require unprivileged user namespaces to run.
        sysctl -w kernel.unprivileged_userns_clone=1
        sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
        ./scripts/bazel_ignore_codes.sh test ${{ matrix.args }} --target_pattern_file=target_files/${{ matrix.tests }} \
          2> >(tee bazel_stderr)
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request_target: null
  push:
    branches:
    - main
  schedule:
  - cron: 9 7 * * 0
